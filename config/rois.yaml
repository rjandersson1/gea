# ROI pixel coordinates for all HUD elements
# Set these using scripts/calibrate_rois.py with GE running
# Format: x1, y1 = top-left corner; x2, y2 = bottom-right corner

heading_tape:
  x1: 0
  y1: 0
  x2: 0
  y2: 0

airspeed_tape:
  x1: 0
  y1: 0
  x2: 0
  y2: 0

altitude_tape:
  x1: 0
  y1: 0
  x2: 0
  y2: 0

attitude_indicator:
  x1: 0
  y1: 0
  x2: 0
  y2: 0

status_bar:
  x1: 0
  y1: 0
  x2: 0
  y2: 0
